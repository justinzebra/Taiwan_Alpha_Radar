# Taiwan Alpha Radar — full stack orchestration.
# Usage:  docker compose up --build
#
# Brings up: postgres + redis + FastAPI backend (auto-seeds on first boot) +
# Next.js frontend. Visit http://localhost:3000 once the stack is healthy.

services:
  db:
    image: postgres:16-alpine
    container_name: tar-db
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar
      POSTGRES_DB: taiwan_alpha_radar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar -d taiwan_alpha_radar"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tar-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: tar-backend
    environment:
      DATABASE_URL: postgresql+psycopg://radar:radar@db:5432/taiwan_alpha_radar
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      DATA_PROVIDER: ${DATA_PROVIDER:-official_close}
      MARKET_HISTORY_DAYS: ${MARKET_HISTORY_DAYS:-180}
      PREDICTION_LOOKBACK_DAYS: ${PREDICTION_LOOKBACK_DAYS:-120}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AUTO_SEED_ON_STARTUP: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* is inlined at build time; pass it as a build arg.
        # Browser-side URL — must be reachable from the user's machine.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    container_name: tar-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
